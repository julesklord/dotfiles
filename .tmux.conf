# --- TMUX CONFIG CON ESTEROIDES ---

# 1. Cambiar Prefijo a Ctrl+a (más ergonómico)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# 2. Soporte para Mouse (porque a veces hace falta)
set -g mouse on

# 3. Colores y Terminal (True Color)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# 4. Numeración de ventanas y paneles desde 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set -g renumber-windows on

# 5. Navegación estilo Vim para paneles
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# 6. Splits más intuitivos
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# 7. Mejoras de calidad de vida
set -g history-limit 1000000     # Historial masivo
set -g set-clipboard on          # Usar portapapeles del sistema
set -g status-position bottom    # Barra abajo (como te gusta)
set -s escape-time 0             # Sin delay para Vim
set -g display-time 4000         # Mensajes de tmux duran más
set -g status-interval 5         # Actualizar barra cada 5s

# 8. --- PLUGINS (TPM) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect' # Guardar sesiones
set -g @plugin 'tmux-plugins/tmux-continuum' # Auto-guardado
set -g @plugin 'tmux-plugins/tmux-cpu'       # Monitor de CPU

# --- Configuración de Catppuccin (Visuales Pro) ---
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"

set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"

set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W"

# Módulos de la derecha: CPU, Directorio, Sesión
set -g @catppuccin_status_modules_right "cpu directory session"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_right_separator_inverse "no"
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"

set -g @catppuccin_directory_text "#{pane_current_path}"

# 9. Inicializar Plugin Manager (Mantener al final)
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

run '~/.tmux/plugins/tpm/tpm'
